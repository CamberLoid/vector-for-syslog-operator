{{- if .Values.metrics.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: {{ include "vector-for-syslog-operator.resourceName" (dict "suffix" "metrics-reader" "context" $) }}
rules:
    - nonResourceURLs:
        - /metrics
      verbs:
        - get
{{- end }}
