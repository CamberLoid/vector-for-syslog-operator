apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: {{ include "vector-for-syslog-operator.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
    - apiGroups:
        - ""
      resources:
        - configmaps
        - services
      verbs:
        - create
        - delete
        - get
        - list
        - patch
        - update
        - watch
    - apiGroups:
        - ""
      resources:
        - events
      verbs:
        - create
        - patch
    - apiGroups:
        - apps
      resources:
        - deployments
      verbs:
        - create
        - delete
        - get
        - list
        - patch
        - update
        - watch
    - apiGroups:
        - vectorsyslog.lab.camber.moe
      resources:
        - vectorsocketsources
        - vectorsyslogconfigurations
      verbs:
        - create
        - delete
        - get
        - list
        - patch
        - update
        - watch
    - apiGroups:
        - vectorsyslog.lab.camber.moe
      resources:
        - vectorsocketsources/finalizers
        - vectorsyslogconfigurations/finalizers
      verbs:
        - update
    - apiGroups:
        - vectorsyslog.lab.camber.moe
      resources:
        - vectorsocketsources/status
        - vectorsyslogconfigurations/status
      verbs:
        - get
        - patch
        - update
