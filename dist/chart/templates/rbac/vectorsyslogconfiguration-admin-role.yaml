{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "vector-for-syslog-operator.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    name: {{ include "vector-for-syslog-operator.resourceName" (dict "suffix" "vectorsyslogconfiguration-admin-role" "context" $) }}
rules:
    - apiGroups:
        - vectorsyslog.lab.camber.moe
      resources:
        - vectorsyslogconfigurations
      verbs:
        - '*'
    - apiGroups:
        - vectorsyslog.lab.camber.moe
      resources:
        - vectorsyslogconfigurations/status
      verbs:
        - get
{{- end }}
