# Orbstack 本地测试配置 - 使用 LoadBalancerClass
# 适用于使用自定义 LoadBalancer Controller 的场景（如 MetalLB、Cilium LB 等）

---
apiVersion: vectorsyslog.lab.camber.moe/v1alpha1
kind: VectorSocketSource
metadata:
  name: test-tcp-25535
  namespace: default
  labels:
    test: orbstack
    protocol: tcp
spec:
  mode: tcp
  port: 25535
  labels:
    source: test_tcp
    env: local
---
apiVersion: vectorsyslog.lab.camber.moe/v1alpha1
kind: VectorSocketSource
metadata:
  name: test-udp-25536
  namespace: default
  labels:
    test: orbstack
    protocol: udp
spec:
  mode: udp
  port: 25536
  labels:
    source: test_udp
    env: local
---
apiVersion: vectorsyslog.lab.camber.moe/v1alpha1
kind: VectorSyslogConfiguration
metadata:
  name: orbstack-test-lbclass
  namespace: default
spec:
  globalPipeline:
    transforms:
      add_test_marker:
        type: remap
        inputs: $$VectorForSyslogOperatorSources$$
        source: |
          .test_run = true
          .received_at = now()
    
    sinks:
      console_pretty:
        type: console
        inputs: [add_test_marker]
        encoding:
          codec: json
          json:
            pretty: true
  
  service:
    type: LoadBalancer
    # 可选：指定 LoadBalancer IP
    # loadBalancerIP: 192.168.1.100
    # 可选：指定 LoadBalancer Class（用于自定义 LB Controller）
    # loadBalancerClass: metallb
    # loadBalancerClass: cilium
  
  sourceSelector:
    matchLabels:
      test: orbstack
  
  replicas: 1
  image: timberio/vector:latest-debian
