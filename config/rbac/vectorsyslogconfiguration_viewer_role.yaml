# This rule is not used by the project vector-for-syslog-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to vectorsyslog.lab.camber.moe resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vector-for-syslog-operator
    app.kubernetes.io/managed-by: kustomize
  name: vectorsyslogconfiguration-viewer-role
rules:
- apiGroups:
  - vectorsyslog.lab.camber.moe
  resources:
  - vectorsyslogconfigurations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - vectorsyslog.lab.camber.moe
  resources:
  - vectorsyslogconfigurations/status
  verbs:
  - get
