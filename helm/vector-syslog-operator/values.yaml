# Default values for vector-syslog-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/camber/vector-syslog-operator
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

rbac:
  # Specifies whether RBAC resources should be created
  create: true

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsUser: 65532
  runAsGroup: 65532

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Manager configuration
manager:
  # Leader election configuration
  leaderElection:
    enabled: true
  # Metrics configuration
  metrics:
    enabled: true
    port: 8443
    secure: true
  # Health probe configuration
  healthProbe:
    port: 8081
  # Webhook configuration (future use)
  webhook:
    enabled: false
    port: 9443

# CRD configuration
crds:
  # Whether to install CRDs
  install: true
  # Keep CRDs on chart uninstall
  keep: false
