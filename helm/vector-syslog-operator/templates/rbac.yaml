{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vector-syslog-operator.fullname" . }}-manager-role
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: vector-syslog-operator
    app.kubernetes.io/part-of: vector-syslog-operator
    {{- include "vector-syslog-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - events
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - configmaps/status
  - services/status
  verbs:
  - get
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments/status
  verbs:
  - get
- apiGroups:
  - vectorsyslog.lab.camber.moe
  resources:
  - vectorsocketsources
  - vectorsyslogconfigurations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - vectorsyslog.lab.camber.moe
  resources:
  - vectorsocketsources/finalizers
  - vectorsocketsources/status
  - vectorsyslogconfigurations/finalizers
  - vectorsyslogconfigurations/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vector-syslog-operator.fullname" . }}-manager-rolebinding
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: vector-syslog-operator
    app.kubernetes.io/part-of: vector-syslog-operator
    {{- include "vector-syslog-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "vector-syslog-operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "vector-syslog-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vector-syslog-operator.fullname" . }}-metrics-reader
  labels:
    app.kubernetes.io/component: kube-rbac-proxy
    app.kubernetes.io/created-by: vector-syslog-operator
    app.kubernetes.io/part-of: vector-syslog-operator
    {{- include "vector-syslog-operator.labels" . | nindent 4 }}
rules:
- nonResourceURLs:
  - /metrics
  verbs:
  - get
{{- end }}
