{{- if .Values.crds.install }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vectorsocketsources.vectorsyslog.lab.camber.moe
  annotations:
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.0
  labels:
    app.kubernetes.io/component: crd
    {{- include "vector-syslog-operator.labels" . | nindent 4 }}
spec:
  group: vectorsyslog.lab.camber.moe
  names:
    kind: VectorSocketSource
    listKind: VectorSocketSourceList
    plural: vectorsocketsources
    singular: vectorsocketsource
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.port
      name: Port
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: VectorSocketSource is the Schema for the vectorsocketsources API
        properties:
          apiVersion:
            description: APIVersion defines the versioned schema of this representation of an object
            type: string
          kind:
            description: Kind is a string value representing the REST resource this object represents
            type: string
          metadata:
            type: object
          spec:
            description: VectorSocketSourceSpec defines the desired state of VectorSocketSource
            properties:
              labels:
                additionalProperties:
                  type: string
                description: Labels to inject into log entries from this source
                type: object
              mode:
                default: tcp
                description: Mode is the socket mode (tcp or udp)
                enum:
                - tcp
                - udp
                type: string
              nodePort:
                description: NodePort is the optional NodePort to use when Service type is NodePort
                format: int32
                maximum: 32767
                minimum: 30000
                type: integer
              port:
                description: Port is the listening port number
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
            required:
            - mode
            - port
            type: object
          status:
            description: VectorSocketSourceStatus defines the observed state of VectorSocketSource
            properties:
              conditions:
                description: Conditions represent the current state of the VectorSocketSource resource
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource
                  properties:
                    lastTransitionTime:
                      description: Last time the condition transitioned from one status to another
                      format: date-time
                      type: string
                    message:
                      description: Human-readable message indicating details about last transition
                      type: string
                    observedGeneration:
                      description: The last component change that updated this condition
                      format: int64
                      type: integer
                    reason:
                      description: Unique, one-word, CamelCase reason for the condition's last transition
                      type: string
                    status:
                      description: Status of the condition
                      type: string
                    type:
                      description: Type of condition
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vectorsyslogconfigurations.vectorsyslog.lab.camber.moe
  annotations:
    {{- if .Values.crds.keep }}
    helm.sh/resource-policy: keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.0
  labels:
    app.kubernetes.io/component: crd
    {{- include "vector-syslog-operator.labels" . | nindent 4 }}
spec:
  group: vectorsyslog.lab.camber.moe
  names:
    kind: VectorSyslogConfiguration
    listKind: VectorSyslogConfigurationList
    plural: vectorsyslogconfigurations
    singular: vectorsyslogconfiguration
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.selectedSources | length
      name: Sources
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: VectorSyslogConfiguration is the Schema for the vectorsyslogconfigurations API
        properties:
          apiVersion:
            description: APIVersion defines the versioned schema of this representation of an object
            type: string
          kind:
            description: Kind is a string value representing the REST resource this object represents
            type: string
          metadata:
            type: object
          spec:
            description: VectorSyslogConfigurationSpec defines the desired state of VectorSyslogConfiguration
            properties:
              globalPipeline:
                description: GlobalPipeline defines global pipeline configuration
                properties:
                  enrichEnabled:
                    default: true
                    description: EnrichEnabled controls whether to enable automatic enrich transforms
                    type: boolean
                  sinks:
                    additionalProperties:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    description: Sinks are sinks defined by user. At least one sink is required.
                    type: object
                  transforms:
                    additionalProperties:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    description: Transforms are global transforms defined by user
                    type: object
                required:
                - sinks
                type: object
              image:
                default: timberio/vector:latest-debian
                description: Image is the Vector image to use
                type: string
              overwriteConfig:
                additionalProperties:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                description: OverwriteConfig allows users to provide raw config sections
                type: object
              replicas:
                default: 1
                description: Replicas is the number of Vector instances to run
                format: int32
                minimum: 1
                type: integer
              resources:
                description: Resources defines the compute resources for Vector pods
                properties:
                  limits:
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                    type: object
                  requests:
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                    type: object
                type: object
              service:
                description: Service is the Service configuration
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations to add to the Service
                    type: object
                  loadBalancerClass:
                    description: LoadBalancerClass is the class of the load balancer
                    type: string
                  loadBalancerIP:
                    description: LoadBalancerIP is the IP address to assign to the LoadBalancer
                    type: string
                  type:
                    default: LoadBalancer
                    description: Type is the Service type
                    enum:
                    - LoadBalancer
                    - NodePort
                    type: string
                type: object
              sourceSelector:
                description: SourceSelector selects VectorSocketSource resources to include
                properties:
                  matchExpressions:
                    items:
                      properties:
                        key:
                          type: string
                        operator:
                          type: string
                        values:
                          items:
                            type: string
                          type: array
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                  matchLabels:
                    additionalProperties:
                      type: string
                    type: object
                type: object
            required:
            - globalPipeline
            type: object
          status:
            description: VectorSyslogConfigurationStatus defines the observed state of VectorSyslogConfiguration
            properties:
              conditions:
                description: Conditions represent the current state of the VectorSyslogConfiguration
                items:
                  description: Condition contains details for one aspect of the current state
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              configHash:
                description: ConfigHash is the hash of the rendered configuration
                type: string
              exposedPorts:
                description: ExposedPorts is the list of exposed ports
                items:
                  properties:
                    mode:
                      description: Mode is the port mode (tcp or udp)
                      type: string
                    name:
                      description: Name is the port name
                      type: string
                    nodePort:
                      description: NodePort is the node port (if using NodePort service)
                      format: int32
                      type: integer
                    port:
                      description: Port is the container port
                      format: int32
                      type: integer
                  required:
                  - mode
                  - name
                  - port
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the last observed generation
                format: int64
                type: integer
              phase:
                description: Phase is the current phase of the configuration
                type: string
              selectedSources:
                description: SelectedSources is the list of selected VectorSocketSource names
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
